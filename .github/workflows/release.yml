name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest -q --ignore=tests/test_mei.py --ignore=tests/test_nubank_pdf.py
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: python scripts/build_exe.py
      - run: python scripts/package_portable.py
      - uses: actions/upload-artifact@v4
        with:
          name: OrcFin-windows-portable
          path: dist/

  publish:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: OrcFin-windows-portable
          path: dist
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release delete "$TAG" -y 2>/dev/null || true
          gh release create "$TAG" \
            --title "OrcFin $TAG" \
            --notes-file .github/release-body.md \
            --latest \
            dist/OrcFin-portable.zip